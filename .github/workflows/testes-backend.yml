name: Testes Python Backend

on:
  pull_request:
    branches:
      - develop
      - main 
jobs:
  rodar-testes:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências da API e Testes
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.api.txt -r requirements.test.txt

      - name: Executar testes da API com Pytest e Cobertura
        run: pytest --cov=app --cov-fail-under=90 tests/api tests/test_setup.py

  testes-etl:
    name: Testes do ETL (Worker)
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências do ETL e Testes
        run: |
          python -m pip install --upgrade pip
          # 1. Instala dependências de teste
          pip install -r requirements.test.txt
          
          # 2. Instala o worker filtrando o google-genai para evitar o conflito no resolver
          grep -v "google-genai" requirements.worker.txt > temp_requirements.txt
          pip install -r temp_requirements.txt
          rm temp_requirements.txt
          
          # 3. Instala a versão específica do google-genai
          pip install "google-genai==2.8.0"

      - name: Executar testes do ETL com Pytest e Cobertura
        run: pytest --cov=etl --cov=utils --cov-fail-under=90 tests/etl